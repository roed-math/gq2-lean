# formalization.yaml (v0.3) — see https://github.com/mathlib-initiative/formalization.yaml

version: "v0.3"

project:
  name: "gq2-lean"
  authors:
    - "David Roe"
  license: "Apache-2.0"

sources:
  - title: "A Presentation of the Absolute Galois Group of Q_2"
    authors: ["David Turturean"]
    id: "current writeup at https://roed314.github.io/gq2/; original source snapshot at paper/A_Profinite_Presentation_for_G__Q_2.pdf"
    type: "machine-generated preprint (GPT)"
    license: ""
    author_contacted: "yes"
    prior_work: ""

status:
  scope: >
    Complete end-to-end formalization of the paper's main result (numbered Theorem 1.2
    in the retained original PDF): the
    absolute Galois group of Q_2 is isomorphic as a profinite group to an explicit
    4-generator 2-relator marked quotient Gamma_A, together with the surjection-count
    form (for every finite G, the number of continuous surjections G_Q2 ->> G equals
    the number of admissible marked quadruples in G^4). Proved sorry-free from a
    frozen census of 9 literature axioms (deep local-arithmetic inputs Mathlib does
    not yet contain, each with a precise citation — see GQ2/Foundations/Axioms.lean
    and docs/literature-axioms.md).
  sorry_count: 0
  sorry_in_definitions: 0
  axioms:
    - "propext"
    - "Classical.choice"
    - "Quot.sound"
    - "GQ2.Foundations.absGalQ2_isTopologicallyFinitelyGenerated"   # B1
    - "GQ2.Foundations.absGalQ2_localEulerCharacteristic"           # B7
    - "GQ2.dyadicOrientation"                                       # B3c
    - "GQ2.localReciprocity"                                        # B5
    - "GQ2.tateDualityAt"                                           # B6
    - "GQ2.peripheralCyclotomicAction"                              # B8
    - "GQ2.relativeStiefelWhitney_dyadic"                                        # B9
    - "GQ2.tameQuotient"                                            # B10
    - "GQ2.hilbertSymbol_normCriterion_finiteDyadic"                # B11a
  main_results:
    - declaration: "GQ2.main_presentation_literal"
      file: "GQ2/PresentationLiteral.lean"
      sorry_count: 0
      axioms:
        - "propext"
        - "Classical.choice"
        - "Quot.sound"
        - "GQ2.Foundations.absGalQ2_isTopologicallyFinitelyGenerated"
        - "GQ2.Foundations.absGalQ2_localEulerCharacteristic"
        - "GQ2.dyadicOrientation"
        - "GQ2.localReciprocity"
        - "GQ2.tateDualityAt"
        - "GQ2.peripheralCyclotomicAction"
        - "GQ2.relativeStiefelWhitney_dyadic"
        - "GQ2.tameQuotient"
        - "GQ2.hilbertSymbol_normCriterion_finiteDyadic"
      comparator_config: "comparator-config.json"
      literature_dependencies:
        - statement: "G_Q2 is topologically finitely generated (B1)"
          source: "standard local-fields literature; citation in GQ2/Foundations/Axioms.lean"
        - statement: "local Euler characteristic formula at p = 2 (B7)"
          source: "citation in GQ2/Foundations/Axioms.lean and docs/literature-axioms.md"
        - statement: "dyadic orientation / cyclotomic normalization (B3c)"
          source: "citation in GQ2/Foundations/Axioms.lean and docs/literature-axioms.md"
        - statement: "local reciprocity (local class field theory) for Q_2 (B5)"
          source: "citation in GQ2/Foundations/Axioms.lean and docs/literature-axioms.md"
        - statement: "local Tate duality at finite extensions k/Q_2 (B6, base-generalized)"
          source: "citation in GQ2/Foundations/Axioms.lean and docs/literature-axioms.md"
        - statement: "peripheral cyclotomic action (B8)"
          source: "citation in GQ2/Foundations/Axioms.lean and docs/literature-axioms.md"
        - statement: "relative Stiefel-Whitney identity (Evens-Kahn/Kozlowski), dyadic case (B9)"
          source: "citation in GQ2/Foundations/Axioms.lean and docs/literature-axioms.md"
        - statement: "oriented tame quotient structure of G_Q2 (B10)"
          source: "citation in GQ2/Foundations/Axioms.lean and docs/literature-axioms.md"
        - statement: "Hilbert-symbol norm criterion for finite dyadic extensions (B11a)"
          source: "citation in GQ2/Foundations/Axioms.lean and docs/literature-axioms.md"

automation:
  methods:
    - method: "agent"
      models: ["claude-opus-4-8", "claude-fable-5"]
      framework: "Claude Code"
      tool_setup: >
        Multi-agent orchestrator-worker swarm: a main orchestrating session dispatched
        parallel worker agents per ticket/file, coordinated through an on-disk ticket
        board, per-ticket plans, and handoff documents (raw archive preserved in
        docs/orchestration/). Workers used the lean-lsp MCP server and streaming
        `lake build` verification; an axiom-hygiene gate (scripts/check_axioms.sh)
        enforced the frozen axiom census, zero sorries, and no native_decide on every
        wave. A post-completion 34-wave cleanup marathon (mathlib-quality skill suite:
        per-file golf, renames, cross-file dedup, proof decomposition, file splitting)
        improved the lean code quality, though not up to mathlib standards.
      cost:
        wall_time: "~2 weeks wall clock (2026-07-01 to 2026-07-14); main proof complete 2026-07-08"
        spend_usd: "$600 (three Claude Max 20 subscriptions)"
        hardware: "a single Macbook Pro laptop"
      prompting_notes: >
        Per-ticket briefs with acceptance criteria and axiom budgets (see
        docs/orchestration/tickets.md and p*.md plan files); cleanup-phase worker
        prompts enforced byte-identical theorem statements, streaming-only builds,
        and anti-destruction rules for parallel lanes.
  spend_usd: "$600 (three Claude Max 20 subscriptions)"
  notes: >
    Human role was orchestration-level: approving axiom-census changes, owner-gated
    design decisions, and review checkpoints; the Lean code was written by the agent
    swarm. Commit trailers record the models used per commit.

fidelity:
  divergences: >
    Statements track the paper closely; module docstrings carry paper-tag ledgers
    mapping equations/propositions to declarations. Known deviations: (i) the nine
    literature inputs are axiomatized rather than proved (each base-generalized only
    where noted, e.g. Tate duality stated for all finite k/Q_2); (ii) a transcription
    erratum in the paper's H^0 bookkeeping was found and corrected during
    formalization (docs/erratum-h0-transcription.md); (iii) helper-lemma names follow
    mathlib conventions rather than paper numbering; (iv) six axioms present at proof
    completion were later discharged in-repo or deleted as unused (census 15 -> 9),
    so the axiom set is smaller than the one the paper's appendix assumes.

review:
  status: "agent-reviewed"
  reviewers: []
  notes: >
    No external human peer review yet. Internal review: adversarial multi-agent review
    of the axiom census (docs/adversarial-axioms-review.md), a foundations audit
    (docs/foundations-audit.md), off-path statement checks (docs/off-path-statements.md),
    and continuous mechanical gates (kernel-checked builds, axiom census script,
    zero-sorry enforcement). The post-refactor Lean Compass report identifies 30 project
    declarations for human semantic review (atlas-audit.md); those declarations have not yet
    received external human review. The main result is independently checkable with
    leanprover/comparator via comparator-config.json (Challenge.lean / Solution.lean).

alignment:
  namespace: "GQ2"
  statements:
    - source: "Presentation theorem (Theorem 1.2 in the retained original PDF)"
      lean: "GQ2.main_presentation_literal"
      module: "GQ2/PresentationLiteral.lean"
      status: "proved"
      note: "literal form: Nonempty (ContinuousMulEquiv GammaA AbsGalQ2)"
    - source: "Presentation theorem, surjection-count form (Theorem 1.2 in the retained original PDF)"
      lean: "GQ2.SectionTen.main_surjection_count'"
      module: "GQ2/SectionTenSources.lean"
      status: "proved"
      note: "#{continuous surjections G_Q2 ->> G} = #{admissible marked quadruples in G^4}"
    - source: "Definition of the candidate group Gamma_A (equation (7) in the retained original PDF)"
      lean: "GQ2.GammaA"
      module: "GQ2/GammaA.lean"
      status: "proved"
      note: "largest quotient of the free profinite group F_4 all of whose finite quotients are admissible"
    - source: "Admissible-marking count for Gamma_A (Proposition 2.3 in the retained original PDF)"
      lean: "GQ2.prop_2_3"
      module: "GQ2/Prop23.lean"
      status: "proved"
    - source: "Literature inputs B1-B11a (Appendix B in the retained original PDF)"
      lean: "GQ2/Foundations/Axioms.lean (9 axioms)"
      module: "GQ2/Foundations/Axioms.lean"
      status: "literature-dependency"
      note: "frozen census enforced by scripts/check_axioms.sh; per-axiom citations in docs/literature-axioms.md"

acknowledgements: >
  Built on mathlib4 (pinned at ec410d2, 2026-06-12). Comparator verification uses
  leanprover/comparator and leanprover/lean4export. Process archive:
  docs/orchestration/.
